*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f4f5f7;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.floor-tabs{display:flex;gap:4px}
.floor-tab{padding:4px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;background:transparent;transition:all .15s}

.filter-bar{background:#fff;border-bottom:1px solid #e0e3e8;padding:7px 18px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.fl{font-size:11px;color:#999;margin-right:2px}
.fb{padding:3px 11px;border-radius:20px;border:1px solid #d0d4da;background:#fff;font-size:11px;cursor:pointer;color:#555;transition:all .15s}
.fb:hover{border-color:#2C3E50;color:#2C3E50}
.fb.active{background:#2C3E50;color:#fff;border-color:#2C3E50}
.main{display:flex;flex:1;overflow:hidden}
.map-area{flex:1;position:relative;overflow:hidden;background:#dde0e5;cursor:grab}
.map-area:active{cursor:grabbing}
#mapCanvas{position:absolute;transform-origin:0 0}
#floorImg{display:block;max-width:none;user-select:none;pointer-events:none}
.zone{position:absolute;border:2px solid transparent;border-radius:4px;cursor:pointer;transition:filter .15s;display:flex;align-items:center;justify-content:center}
.zone:hover{filter:brightness(0.85);border-color:rgba(44,62,80,0.6)!important}
.zone.sel{border-color:#e74c3c!important;border-width:3px}
.zone-label{font-size:11px;font-weight:700;color:#fff;text-align:center;pointer-events:none;text-shadow:0 0 5px rgba(0,0,0,0.9);line-height:1.3;padding:2px}
.miss-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#e74c3c;border:1.5px solid #fff;pointer-events:none}
.zoom-controls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zb{width:32px;height:32px;border-radius:8px;border:1px solid #d0d4da;background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.1);color:#2C3E50}
.zb:hover{background:#f0f2f5}
.side-panel{width:320px;background:#fff;border-left:1px solid #e0e3e8;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panel-header{padding:14px 16px 10px;border-bottom:1px solid #e0e3e8;flex-shrink:0}
.pname{font-size:16px;font-weight:700;color:#1a1a2e}
.pmeta{font-size:11px;color:#999;margin-top:2px}
.panel-tabs{display:flex;border-bottom:1px solid #e0e3e8;flex-shrink:0}
.ptab{flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:#999;border-bottom:2px solid transparent;transition:all .15s}
.ptab.active{color:#2C3E50;border-bottom-color:#2C3E50}
.panel-content{flex:1;overflow-y:auto;padding:8px 0}
.cat-hd{padding:5px 16px;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;background:#f8f9fa;border-top:1px solid #f0f2f4;border-bottom:1px solid #f0f2f4}
.item-row{display:flex;padding:6px 16px;border-bottom:1px solid #f5f6f8;gap:8px}
.ik{font-size:11px;color:#777;min-width:100px;flex-shrink:0}
.iv{font-size:11px;color:#1a1a2e;flex:1;word-break:break-all}
.iv.miss{color:#e74c3c;font-style:italic}
.sb{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;margin-left:3px}
.s정상{background:#e8f5e9;color:#2e7d32}
.s주의{background:#fff8e1;color:#f57f17}
.s불량{background:#fdecea;color:#c62828}
.s미확인{background:#f3f4f6;color:#aaa}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#ccc;gap:8px;padding:28px;text-align:center}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2C3E50;color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

let S = {floor:"1",filter:"all",tab:"facility",selId:null,zoom:1,pan:{x:0,y:0},drag:false,ds:{x:0,y:0}};

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyT(){
  document.getElementById("mapCanvas").style.transform=`translate(${S.pan.x}px,${S.pan.y}px) scale(${S.zoom})`;
}

function fitScreen(){
  const img=document.getElementById("floorImg");
  const area=document.getElementById("mapArea");
  const iw=img.naturalWidth, ih=img.naturalHeight;
  if(!iw||!ih) return;
  S.zoom=Math.min(area.clientWidth/iw, area.clientHeight/ih)*0.90;
  S.pan.x=(area.clientWidth -iw*S.zoom)/2;
  S.pan.y=(area.clientHeight-ih*S.zoom)/2;
  applyT();
}

    if(S.filter==="미확인"&&!hasMiss) return;
    if(S.filter!=="all"&&S.filter!=="미확인"){
      const has=[...DATA.facility,...DATA.furnishings].some(i=>i.sid===m.space_id&&i.cat===S.filter);
      if(!has) return;
    }
    const div=document.createElement("div");
    div.className="zone"+(m.space_id===S.selId?" sel":"");
    const isSel=m.space_id===S.selId;
    const isMissFilter=S.filter==="미확인"&&hasMiss;
    div.style.cssText=`position:absolute;left:${m.x/100*iw}px;top:${m.y/100*ih}px;width:${m.w/100*iw}px;height:${m.h/100*ih}px;background:${isSel?rgba(m.color,0.15):"transparent"};border:${isSel?"3px solid #e74c3c":isMissFilter?"2px dashed #e74c3c":"2px solid transparent"};border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s`;
    div.addEventListener("mouseenter",()=>{div.style.background=rgba(m.color,0.18);div.style.borderColor=rgba(m.color,0.8);});
    div.addEventListener("mouseleave",()=>{if(m.space_id!==S.selId){div.style.background="transparent";div.style.borderColor=isMissFilter?"#e74c3c":"transparent";}});
    const lbl=document.createElement("div");
    lbl.style.cssText="font-size:11px;font-weight:700;color:transparent;text-align:center;pointer-events:none;line-height:1.3;padding:2px";
    lbl.textContent=m.label;
    div.appendChild(lbl);
    if(hasMiss){
      const dot=document.createElement("div");
      dot.style.cssText="position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#e74c3c;border:1.5px solid #fff";
      div.appendChild(dot);
    }
    div.addEventListener("click",()=>selectSpace(m.space_id));
    layer.appendChild(div);
  });
}

function switchFloor(floor){
  S.floor=floor; S.selId=null;
  document.getElementById("ptabs").style.display="none";
  document.getElementById("pname").textContent="공간을 선택하세요";
  document.getElementById("pmeta").textContent="";
  document.getElementById("pcontent").innerHTML='<div class="empty"><div style="font-size:32px">🗺</div><div style="font-size:13px;color:#bbb">도면에서 공간을 클릭하세요</div></div>';
  const img=document.getElementById("floorImg");
  img.src="";
  setTimeout(()=>{ loadFromGAS(floor); },10);
}

document.getElementById("floorImg").addEventListener("load", function(){
  fitScreen();
  renderZones();
});

document.querySelectorAll(".floor-tab").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".floor-tab").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    switchFloor(b.dataset.floor);
  });
});

function selectSpace(sid){
  S.selId=sid;
  renderZones();
  const sp=DATA.spaces.find(s=>s.id===sid);
  document.getElementById("pname").textContent=sp?sp.name:sid;
  const meta=sp?[sp.type,sp.m2?sp.m2+"㎡":"",sp.py?sp.py+"평":""].filter(Boolean).join(" · "):"";
  document.getElementById("pmeta").textContent=meta;
  document.getElementById("ptabs").style.display="flex";
  renderPanel(sid);
}

function renderPanel(sid){
  const content=document.getElementById("pcontent");
  let src=S.tab==="facility"?DATA.facility:DATA.furnishings;
  let items=src.filter(i=>i.sid===sid);
  if(S.filter!=="all"&&S.filter!=="미확인") items=items.filter(i=>i.cat===S.filter);
  if(S.filter==="미확인") items=items.filter(i=>i.val==="미확인"||i.st==="미확인");
  if(!items.length){content.innerHTML='<div class="empty"><div style="font-size:28px">📭</div><div style="font-size:12px;color:#bbb">해당 항목 없음</div></div>';return;}
  const groups={};
  items.forEach(i=>{(groups[i.cat]=groups[i.cat]||[]).push(i);});
  content.innerHTML=Object.entries(groups).map(([cat,rows])=>`
    <div class="cat-hd">${cat}</div>
    ${rows.map(r=>{
      const miss=r.val==="미확인"||r.st==="미확인";
      const st=r.st?`<span class="sb s${r.st}">${r.st}</span>`:"";
      const dim=r.dim?`<span style="color:#bbb;font-size:10px;margin-left:3px">${r.dim}</span>`:"";
      const loc=r.loc?`<div style="font-size:10px;color:#aaa;margin-top:2px">📍 ${r.loc}</div>`:"";
      const note=r.note?`<div style="font-size:10px;color:#aaa;margin-top:1px">💬 ${r.note}</div>`:"";
      const qty=r.qty&&r.qty!=="미확인"?` × ${r.qty}`:"";
      const mov=r.mov?`<span style="font-size:10px;color:#aaa;margin-left:5px">이동:${r.mov}</span>`:"";
      const val=r.val||r.brand||"";
      return `<div class="item-row"><div class="ik">${r.name||""}</div><div class="iv${miss?' miss':''}">${val}${qty}${st}${dim}${mov}${loc}${note}</div></div>`;
    }).join("")}
  `).join("");
}

document.querySelectorAll(".fb").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".fb").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    S.filter=b.dataset.f;
    renderZones();
    if(S.selId) renderPanel(S.selId);
  });
});

document.querySelectorAll(".ptab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".ptab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    S.tab=t.dataset.tab;
    if(S.selId) renderPanel(S.selId);
  });
});

function doZoom(d,cx,cy){
  const area=document.getElementById("mapArea");
  const r=area.getBoundingClientRect();
  const px=(cx??r.width/2)-r.left, py=(cy??r.height/2)-r.top;
  const nz=Math.min(5,Math.max(0.15,S.zoom*(1+d)));
  S.pan.x=px-(px-S.pan.x)*(nz/S.zoom);
  S.pan.y=py-(py-S.pan.y)*(nz/S.zoom);
  S.zoom=nz; applyT();
}
document.getElementById("zIn").addEventListener("click",()=>doZoom(0.25));
document.getElementById("zOut").addEventListener("click",()=>doZoom(-0.25));
document.getElementById("zFit").addEventListener("click",fitScreen);
document.getElementById("mapArea").addEventListener("wheel",e=>{e.preventDefault();doZoom(e.deltaY<0?.12:-.12,e.clientX,e.clientY);},{passive:false});

const ma=document.getElementById("mapArea");
ma.addEventListener("mousedown",e=>{if(e.target.closest(".zone"))return;S.drag=true;S.ds={x:e.clientX-S.pan.x,y:e.clientY-S.pan.y};});
window.addEventListener("mousemove",e=>{if(!S.drag)return;S.pan.x=e.clientX-S.ds.x;S.pan.y=e.clientY-S.ds.y;applyT();});
window.addEventListener("mouseup",()=>{S.drag=false;});

// 초기 로드
async function loadFromGAS(floor) {
  try {
    const res = await fetch(`${GAS_URL}?action=all&floor=${floor}`);
    const json = await res.json();
    if (json.ok && json.data) {
      const d = json.data;
      // spaces
      if (d.spaces && d.spaces.length) {
        DATA.spaces = d.spaces.map(s => ({
          id: s.space_id, name: s.space_name, floor: s.floor,
          type: s.space_type, m2: s.area_m2, py: s.area_py
        }));
      }
      // facility
      if (d.facility && d.facility.length) {
        DATA.facility = d.facility.map(i => ({
          sid: i.space_id, cat: i.category, name: i.item_name,
          val: i.value, st: i.status, dim: i.dimension,
          loc: i.location_desc, note: i.notes
        }));
      }
      // furnishings
      if (d.furnishings && d.furnishings.length) {
        DATA.furnishings = d.furnishings.map(i => ({
          sid: i.space_id, cat: i.category, name: i.item_name,
          brand: i.brand_model, qty: i.quantity, dim: i.dimension,
          st: i.status, mov: i.movable, loc: i.location_desc, note: i.notes
        }));
      }
    }
  } catch(e) {
    console.log("GAS 로드 실패, 내장 데이터 사용:", e);
  }
  document.getElementById("floorImg").src = IMG[floor];
}

loadFromGAS("1");
</script>
