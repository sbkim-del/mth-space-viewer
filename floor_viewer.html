<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTH 공간정보 뷰어 — 금토동</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f4f5f7;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 헤더 */
header{background:#2C3E50;color:#fff;padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hd-title{font-size:14px;font-weight:600}
.hd-right{display:flex;align-items:center;gap:6px}

/* 층 탭 */
.floor-tabs{display:flex;gap:4px}
.floor-tab{padding:4px 13px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;background:transparent;transition:all .15s}
.floor-tab.active{background:#fff;color:#2C3E50;font-weight:600;border-color:#fff}

/* 필터 바 */
.filter-bar{background:#fff;border-bottom:1px solid #e0e3e8;padding:7px 18px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.fl{font-size:11px;color:#999;margin-right:2px}
.fb{padding:3px 11px;border-radius:20px;border:1px solid #d0d4da;background:#fff;font-size:11px;cursor:pointer;color:#555;transition:all .15s}
.fb:hover{border-color:#2C3E50;color:#2C3E50}
.fb.active{background:#2C3E50;color:#fff;border-color:#2C3E50}

/* 메인 */
.main{display:flex;flex:1;overflow:hidden}

/* 도면 */
.map-area{flex:1;position:relative;overflow:hidden;background:#dde0e5;cursor:grab}
.map-area:active{cursor:grabbing}
.map-canvas{position:absolute;transform-origin:0 0}
.floor-img{display:block;max-width:none;user-select:none;pointer-events:none}

/* 공간 오버레이 */
.zone{position:absolute;border:2px solid transparent;border-radius:4px;cursor:pointer;transition:filter .15s,border-color .15s;display:flex;align-items:center;justify-content:center}
.zone:hover{filter:brightness(0.88);border-color:rgba(44,62,80,0.5)!important}
.zone.sel{border-color:#e74c3c!important;border-width:3px}
.zone-label{font-size:11px;font-weight:700;color:#fff;text-align:center;pointer-events:none;text-shadow:0 0 5px rgba(0,0,0,0.8);line-height:1.3;padding:2px}

/* 미확인 뱃지 */
.miss-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#e74c3c;border:1.5px solid #fff;pointer-events:none}

/* 줌 */
.zoom-controls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:10}
.zb{width:32px;height:32px;border-radius:8px;border:1px solid #d0d4da;background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,0.1);color:#2C3E50}
.zb:hover{background:#f0f2f5}

/* 사이드 패널 */
.side-panel{width:320px;background:#fff;border-left:1px solid #e0e3e8;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panel-header{padding:14px 16px 10px;border-bottom:1px solid #e0e3e8;flex-shrink:0}
.pname{font-size:16px;font-weight:700;color:#1a1a2e}
.pmeta{font-size:11px;color:#999;margin-top:2px}

/* 패널 탭 */
.panel-tabs{display:flex;border-bottom:1px solid #e0e3e8;flex-shrink:0}
.ptab{flex:1;padding:8px 0;text-align:center;font-size:12px;font-weight:500;cursor:pointer;color:#999;border-bottom:2px solid transparent;transition:all .15s}
.ptab.active{color:#2C3E50;border-bottom-color:#2C3E50}

/* 패널 콘텐츠 */
.panel-content{flex:1;overflow-y:auto;padding:8px 0}
.cat-hd{padding:5px 16px;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;background:#f8f9fa;border-top:1px solid #f0f2f4;border-bottom:1px solid #f0f2f4}
.item-row{display:flex;padding:6px 16px;border-bottom:1px solid #f5f6f8;gap:8px}
.ik{font-size:11px;color:#777;min-width:100px;flex-shrink:0}
.iv{font-size:11px;color:#1a1a2e;flex:1;word-break:break-all}
.iv.miss{color:#e74c3c;font-style:italic}
.sb{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;margin-left:3px}
.s정상{background:#e8f5e9;color:#2e7d32}
.s주의{background:#fff8e1;color:#f57f17}
.s불량{background:#fdecea;color:#c62828}
.s미확인{background:#f3f4f6;color:#aaa}

/* 빈 상태 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#ccc;gap:8px;padding:28px;text-align:center}
.ei{font-size:32px}
.et{font-size:13px;color:#bbb}
.es{font-size:11px;color:#d0d0d0}

/* 로딩 */
.loading{position:absolute;inset:0;background:rgba(244,245,247,0.88);display:flex;align-items:center;justify-content:center;z-index:100;font-size:13px;color:#666;gap:10px}
.spin{width:20px;height:20px;border:3px solid #e0e3e8;border-top-color:#2C3E50;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2C3E50;color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="hd-title">🏠 MTH 공간정보 — 금토동</div>
  <div class="hd-right">
    <div class="floor-tabs">
      <button class="floor-tab active" data-floor="1">1층</button>
      <button class="floor-tab" data-floor="2">2층</button>
      <button class="floor-tab" data-floor="3">3층</button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <span class="fl">필터</span>
  <button class="fb active" data-f="all">전체</button>
  <button class="fb" data-f="냉난방">냉난방</button>
  <button class="fb" data-f="조명">조명</button>
  <button class="fb" data-f="창문·문">창문·문</button>
  <button class="fb" data-f="전기·콘센트">전기·콘센트</button>
  <button class="fb" data-f="수도·배수">수도·배수</button>
  <button class="fb" data-f="가구·비품">가구·비품</button>
  <button class="fb" data-f="미확인">⚠ 미확인</button>
</div>

<div class="main">
  <div class="map-area" id="mapArea">
    <div class="map-canvas" id="mapCanvas">
      <img class="floor-img" id="floorImg" alt="도면">
      <div id="zonesLayer"></div>
    </div>
    <div class="zoom-controls">
      <button class="zb" id="zIn">+</button>
      <button class="zb" id="zFit">⊡</button>
      <button class="zb" id="zOut">−</button>
    </div>
    <div class="loading" id="loading"><div class="spin"></div>불러오는 중…</div>
  </div>

  <div class="side-panel">
    <div class="panel-header">
      <div class="pname" id="pname">공간을 선택하세요</div>
      <div class="pmeta" id="pmeta"></div>
    </div>
    <div class="panel-tabs" id="ptabs" style="display:none">
      <div class="ptab active" data-tab="facility">설비</div>
      <div class="ptab" data-tab="furnishings">가구·소품</div>
    </div>
    <div class="panel-content" id="pcontent">
      <div class="empty"><div class="ei">🗺</div><div class="et">도면에서 공간을 클릭하세요</div><div class="es">설비, 가구, 창문 정보를 확인할 수 있어요</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

async function loadData(floor){
  showLoad(true);
  if(!GAS_URL){ loadDummy(floor); showLoad(false); return; }
  try{
    const r = await fetch(`${GAS_URL}?action=all&floor=${floor}`);
    const j = await r.json();
    if(j.ok) S.data = j.data;
  }catch(e){
    toast("GAS 연동 전 — 샘플 데이터로 표시합니다");
    loadDummy(floor);
  }
  showLoad(false);
  renderMap();
}

// ══════════════════════════════════════════
// 도면 렌더링
// ══════════════════════════════════════════
function renderMap(){
  const img = document.getElementById("floorImg");
  img.src = IMG[S.floor] || "";
  img.onload = () => { fitScreen(); renderZones(); };
  img.onerror = () => { img.style.cssText="width:900px;height:640px;background:#ccc"; fitScreen(); renderZones(); };
}

function renderZones(){
  const layer = document.getElementById("zonesLayer");
  layer.innerHTML = "";
  const imgW = document.getElementById("floorImg").naturalWidth  || 900;
  const imgH = document.getElementById("floorImg").naturalHeight || 640;
  const maps = FLOOR_MAP.filter(m => m.floor === S.floor);

  maps.forEach(m => {
    const hasMiss = hasMissing(m.space_id);
    if(S.filter === "미확인" && !hasMiss) return;
    if(S.filter !== "all" && S.filter !== "미확인"){
      const items = [...(S.data.facility||[]),...(S.data.furnishings||[])].filter(i=>i.space_id===m.space_id && i.category===S.filter);
      if(!items.length) return;
    }

    const x = m.x_pct/100*imgW, y = m.y_pct/100*imgH;
    const w = m.w_pct/100*imgW, h = m.h_pct/100*imgH;

    const div = document.createElement("div");
    div.className = "zone" + (m.space_id===S.selId?" sel":"");
    div.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${rgba(m.color,m.opacity)};border-color:${rgba(m.color,0.6)}`;
    if(S.filter==="미확인"&&hasMiss) div.style.borderColor="#e74c3c";

    const lbl = document.createElement("div");
    lbl.className = "zone-label";
    lbl.textContent = m.label;
    div.appendChild(lbl);

    if(hasMiss){
      const badge = document.createElement("div");
      badge.className = "miss-badge";
      div.appendChild(badge);
    }

    div.addEventListener("click", ()=>selectSpace(m.space_id));
    layer.appendChild(div);
  });
}

function hasMissing(sid){
  return [...(S.data.facility||[]),...(S.data.furnishings||[])]
    .filter(i=>i.space_id===sid)
    .some(i=>i.value==="미확인"||i.status==="미확인");
}

// ══════════════════════════════════════════
// 공간 선택
// ══════════════════════════════════════════
function selectSpace(sid){
  S.selId = sid;
  renderZones();
  const sp = (S.data.spaces||[]).find(s=>s.space_id===sid);
  document.getElementById("pname").textContent = sp ? sp.space_name : sid;
  const meta = sp ? [sp.space_type, sp.area_m2?sp.area_m2+"㎡":"", sp.area_py?sp.area_py+"평":""].filter(Boolean).join(" · ") : "";
  document.getElementById("pmeta").textContent = meta;
  document.getElementById("ptabs").style.display = "flex";
  renderPanel(sid);
}

function renderPanel(sid){
  const content = document.getElementById("pcontent");
  let items = (S.data[S.tab]||[]).filter(i=>i.space_id===sid);

  if(S.filter!=="all"&&S.filter!=="미확인") items=items.filter(i=>i.category===S.filter);
  if(S.filter==="미확인") items=items.filter(i=>i.value==="미확인"||i.status==="미확인");

  if(!items.length){
    content.innerHTML=`<div class="empty"><div class="ei">📭</div><div class="et">해당 항목 없음</div></div>`;
    return;
  }

  const groups={};
  items.forEach(i=>{ (groups[i.category]=groups[i.category]||[]).push(i); });

  content.innerHTML = Object.entries(groups).map(([cat,rows])=>`
    <div class="cat-hd">${cat}</div>
    ${rows.map(r=>{
      const miss = r.value==="미확인"||r.status==="미확인";
      const st   = r.status?`<span class="sb s${r.status}">${r.status}</span>`:"";
      const dim  = r.dimension?`<span style="color:#bbb;font-size:10px;margin-left:3px">${r.dimension}</span>`:"";
      const loc  = r.location_desc?`<div style="font-size:10px;color:#aaa;margin-top:2px">📍 ${r.location_desc}</div>`:"";
      const note = r.notes?`<div style="font-size:10px;color:#aaa;margin-top:1px">💬 ${r.notes}</div>`:"";
      const qty  = r.quantity&&r.quantity!=="미확인"?` × ${r.quantity}`:"";
      const mov  = r.movable?`<span style="font-size:10px;color:#aaa;margin-left:5px">이동: ${r.movable}</span>`:"";
      return `<div class="item-row">
        <div class="ik">${r.item_name||""}</div>
        <div class="iv${miss?' miss':''}">${r.value||""}${qty}${st}${dim}${mov}${loc}${note}</div>
      </div>`;
    }).join("")}
  `).join("");
}

// ══════════════════════════════════════════
// 줌 & 패닝
// ══════════════════════════════════════════
function applyT(){
  document.getElementById("mapCanvas").style.transform=`translate(${S.pan.x}px,${S.pan.y}px) scale(${S.zoom})`;
}
function fitScreen(){
  const a=document.getElementById("mapArea");
  const img=document.getElementById("floorImg");
  const iw=img.naturalWidth||900, ih=img.naturalHeight||640;
  S.zoom=Math.min(a.clientWidth/iw, a.clientHeight/ih)*0.90;
  S.pan.x=(a.clientWidth -iw*S.zoom)/2;
  S.pan.y=(a.clientHeight-ih*S.zoom)/2;
  applyT();
}
function doZoom(d,cx,cy){
  const a=document.getElementById("mapArea");
  const r=a.getBoundingClientRect();
  const px=(cx??r.width/2)-r.left, py=(cy??r.height/2)-r.top;
  const nz=Math.min(5,Math.max(0.15,S.zoom*(1+d)));
  S.pan.x=px-(px-S.pan.x)*(nz/S.zoom);
  S.pan.y=py-(py-S.pan.y)*(nz/S.zoom);
  S.zoom=nz; applyT();
}
document.getElementById("zIn") .addEventListener("click",()=>doZoom( 0.25));
document.getElementById("zOut").addEventListener("click",()=>doZoom(-0.25));
document.getElementById("zFit").addEventListener("click",fitScreen);
document.getElementById("mapArea").addEventListener("wheel",e=>{e.preventDefault();doZoom(e.deltaY<0?.12:-.12,e.clientX,e.clientY);},{passive:false});

const ma=document.getElementById("mapArea");
ma.addEventListener("mousedown",e=>{if(e.target.classList.contains("zone"))return;S.drag=true;S.ds={x:e.clientX-S.pan.x,y:e.clientY-S.pan.y};});
window.addEventListener("mousemove",e=>{if(!S.drag)return;S.pan.x=e.clientX-S.ds.x;S.pan.y=e.clientY-S.ds.y;applyT();});
window.addEventListener("mouseup",()=>{S.drag=false;});

// 터치
let lt=null;
ma.addEventListener("touchstart",e=>{if(e.touches.length===1)lt=e.touches[0];});
ma.addEventListener("touchmove",e=>{if(e.touches.length===1&&lt){const t=e.touches[0];S.pan.x+=t.clientX-lt.clientX;S.pan.y+=t.clientY-lt.clientY;lt=t;applyT();e.preventDefault();}},{passive:false});

function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
function showLoad(on){document.getElementById("loading").style.display=on?"flex":"none";}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);}
